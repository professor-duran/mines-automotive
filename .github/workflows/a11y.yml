name: Accessibility and link checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  a11y:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build site
        run: npm run build
      - name: axe-core
        run: npm run test:a11y:axe
      - name: pa11y
        run: npm run test:a11y:pa11y
      - name: Lighthouse CI
        run: npm run test:a11y:lh
      - name: Link checker (lychee)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --max-concurrency 8 './dist/**/*.html'
          fail: true
